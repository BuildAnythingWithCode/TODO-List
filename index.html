<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <dialog>
      <div id="modal-content" class="flex column">
        <button id="close-modal-x">&times;</button>
        <h2>Ok, Let's Add Some Shit To Do</h2>
        <form action="" method="post" class="flex column">
          <input
            id="the-shit"
            type="text"
            placeholder="What is the shit?"
            required />
          <textarea
            id="the-details-of-the-shit"
            type="text"
            placeholder="What are the details of the shit?"
            required></textarea>
          <h3>How Important Is This Shit?</h3>
          <label>
            <input
              type="radio"
              id="importance-high"
              name="importance"
              value="high"
              required />
            Really Important
          </label>
          <label>
            <input
              type="radio"
              id="importance-medium"
              name="importance"
              value="medium"
              required />
            Kinda Important
          </label>
          <label>
            <input
              type="radio"
              id="importance-low"
              name="importance"
              value="low"
              required />
            Not That Important
          </label>
          <h3>When Is This Shit Due?</h3>
          <input type="date" name="due-date" id="due-date" required />
          <button type="submit" id="add-to-do">Add it!</button>
        </form>
        <button id="close-modal-lazy">Nevermind, I'm feeling lazy.</button>
      </div>
    </dialog>
    <div id="entire-ui">
      <div id="left-column" class="flex column">
        <h2>Shit To Do</h2>
      </div>
      <div id="right-column" class="flex column">
        <h2>Look At All The Shit You Have To Do</h2>
      </div>
      <div id="sidebar"></div>
      <div id="all-the-shit-you-have-to-do-section"></div>
      <div id="footer" class="flex">
        <button id="start-to-add-some-shit">Add Some Shit To Do</button>
      </div>
      <div id="boring-info" class="flex">
        <a
          href="https://github.com/BuildAnythingWithCode/TODO-List"
          target="_blank"
          >Made with love, or some shit</a
        >
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
